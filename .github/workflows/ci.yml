name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# 同一 PR 上取消旧的运行
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - run: npm ci
            - run: npm run format:check
            - run: npm run lint

    test:
        name: Test (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - run: npm ci
            - run: npm run test:run

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci
            - run: npm run build:demo
            - uses: actions/upload-artifact@v4
              with:
                  name: demo-dist
                  path: demo-dist
                  retention-days: 7
